appId: com.vibeops.app
productName: VibeOps
# Skip the implicit rebuild step. better-sqlite3 is rebuilt in postinstall;
# node-pty is N-API, the shipped prebuilds work across Node/Electron ABIs and
# trying to rebuild from source would fail on its winpty submodule.
npmRebuild: false
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - "!tools/**/*"
  - "!.github/**/*"
asarUnpack:
  - "**/*.node"
  - "**/node_modules/node-pty/**"
extraResources:
  - from: drizzle
    to: drizzle
  - from: resources/rule-packs
    to: rule-packs
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
protocols:
  - name: VibeOps
    schemes:
      - vibeops
nsis:
  # oneClick: true keeps updates fully silent. quitAndInstall(true, true)
  # invokes the installer with /S, it overwrites the install in place, and
  # auto-launches the new version. No wizard pops up during in-app updates.
  oneClick: true
  perMachine: false
  allowElevation: true
  shortcutName: VibeOps
  deleteAppDataOnUninstall: false
  # Always serve the full installer — differential updates are less reliable
  # across NSIS mode transitions and we'd rather a 100MB download than a
  # half-applied update.
  differentialPackage: false
publish:
  provider: github
  owner: tdube-architech
  repo: VibeOps
  releaseType: release
