appId: com.vibeops.app
productName: VibeOps
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - "!tools/**/*"
  - "!.github/**/*"
asarUnpack:
  - "**/*.node"
  - "**/node_modules/node-pty/**"
extraResources:
  - from: drizzle
    to: drizzle
  - from: resources/rule-packs
    to: rule-packs
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
protocols:
  - name: VibeOps
    schemes:
      - vibeops
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: VibeOps
publish:
  provider: github
  owner: tdube-architech
  repo: VibeOps
  releaseType: release
