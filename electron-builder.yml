appId: com.vibeops.app
productName: VibeOps
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
  - "!tools/**/*"
  - "!.github/**/*"
asarUnpack:
  - "**/*.node"
extraResources:
  - from: drizzle
    to: drizzle
  - from: resources/rule-packs
    to: rule-packs
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: VibeOps
publish: null
